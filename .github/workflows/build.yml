name: Build firmware

on:
  push:
  pull_request:

jobs:
  platformio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio
      - name: Build
        run: pio run

